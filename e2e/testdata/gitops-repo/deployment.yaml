apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  # namespace intentionally omitted (kustomize sets it); rere still matches.
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: app
          image: web:1.0 # pinned
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 1Gi
