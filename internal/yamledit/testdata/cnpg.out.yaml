apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mycluster # primary cluster
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16 # pinned
  resources:
    # tuned by rere
    requests:
      cpu: "250m"
      memory: 295Mi
    limits:
      memory: 295Mi
  storage:
    size: 10Gi
  bootstrap:
    initdb:
      database: app
      owner: app
