apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx # public ingress
  namespace: ingress-nginx
spec:
  interval: 10m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.11.2" # pinned
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
  values:
    # tuned by rere
    controller:
      replicaCount: 2
      resources:
        requests:
          cpu: 250m
          memory: 295Mi
        limits:
          memory: 295Mi
    defaultBackend:
      enabled: true
      resources:
        requests:
          cpu: 15m
          memory: 40Mi
